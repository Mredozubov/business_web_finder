<!DOCTYPE html>
<html>
<head>
  <title>Business Area Scanner</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
    }

    #app {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 390px;
      max-width: 88vw;
      height: 100vh;
      background: white;
      padding: 16px;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      box-shadow: -2px 0 12px rgba(0,0,0,0.2);
      transform: translateX(0);
      transition: transform 0.25s ease;
      z-index: 10;
    }

    #panel.closed { transform: translateX(100%); }

    #panelToggle {
      position: fixed;
      top: 16px;
      right: 390px;
      z-index: 11;
      width: auto;
      min-width: 78px;
      padding: 12px 14px;
      border-radius: 10px 0 0 10px;
      background: #111827;
      color: white;
      border: 2px solid white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35);
      font-size: 15px;
      font-weight: bold;
    }

    #panel.closed + #panelToggle { right: 0; }

    h2 { margin-top: 0; }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 9px;
      margin-top: 6px;
    }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 7px;
    }

    button:hover { background: #1d4ed8; }
    button.secondary { background: #4b5563; }
    button.danger { background: #dc2626; }

    #status {
      margin-top: 12px;
      padding: 10px;
      background: #f1f5f9;
      border-radius: 6px;
      font-size: 14px;
    }

    .business-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
      font-size: 14px;
      cursor: pointer;
    }

    .business-card:hover {
      background: #eef2ff;
      border-color: #2563eb;
    }

    .business-card strong { font-size: 15px; }

    .missing {
      color: #dc2626;
      font-weight: bold;
    }

    .has-website {
      color: #16a34a;
      font-weight: bold;
    }

    a { word-break: break-word; }

    @media (max-width: 700px) {
      #panel {
        top: auto;
        bottom: 0;
        right: 0;
        width: 100vw;
        max-width: 100vw;
        height: 58vh;
        border-left: none;
        border-top: 1px solid #ddd;
        transform: translateY(0);
      }

      #panel.closed {
        transform: translateY(calc(100% - 54px));
      }

      #panelToggle {
        top: auto;
        bottom: 58vh;
        right: 12px;
        border-radius: 10px 10px 0 0;
      }

      #panel.closed + #panelToggle {
        bottom: 54px;
        right: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="map"></div>

    <div id="panel">
      <h2>Business Area Scanner</h2>

      <p>
        Double-click the map to place the scan circle. Drag the outside circle handle to resize it.
      </p>

      <label>Circle Radius: <span id="radiusLabel">Not placed</span></label>

      <label>Search by Business Name</label>
      <input id="nameSearch" placeholder="Example: Starbucks" oninput="renderResults()" />

      <label>Search by Address</label>
      <input id="addressSearch" placeholder="Example: Brooklyn" oninput="renderResults()" />

      <label>Scan Density</label>
      <select id="densitySelect">
        <option value="fast">Fast / wider scan</option>
        <option value="normal" selected>Normal</option>
        <option value="deep">Deep / slower scan</option>
      </select>

      <label>Sort Results</label>
      <select id="sortSelect" onchange="renderResults()">
        <option value="name-asc">Name A-Z</option>
        <option value="name-desc">Name Z-A</option>
        <option value="address-asc">Address A-Z</option>
        <option value="address-desc">Address Z-A</option>
        <option value="rating-desc">Rating High-Low</option>
        <option value="rating-asc">Rating Low-High</option>
        <option value="review-desc">Last Review Newest-Oldest</option>
        <option value="review-asc">Last Review Oldest-Newest</option>
      </select>

      <button onclick="scanCircle()">Scan Circle</button>
      <button onclick="exportCSV()" class="secondary">Export CSV</button>
      <button onclick="clearResults()" class="danger">Clear Results</button>
      <button onclick="removeCircle()" class="danger">Remove Circle</button>

      <div id="status">Double-click the map to place your scan circle.</div>

      <h3>Results: <span id="resultCount">0</span></h3>
      <div id="results"></div>
    </div>

    <button id="panelToggle" onclick="togglePanel()">Hide</button>
  </div>

  <script>
    let map;
    let circle = null;
    let resizeMarker = null;
    let placesService;

    let allBusinesses = [];
    let seenPlaceIds = new Set();
    let markers = [];
    let activeInfoWindow = null;

    const DEFAULT_CENTER = { lat: 40.7128, lng: -74.0060 };
    const DEFAULT_RADIUS = 500;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: DEFAULT_CENTER,
        zoom: 15,
        mapTypeId: "roadmap",
        mapTypeControl: true,
        streetViewControl: true,
        fullscreenControl: true,
        disableDoubleClickZoom: true
      });

      placesService = new google.maps.places.PlacesService(map);

      map.addListener("dblclick", function(event) {
        placeCircle(event.latLng);
      });

      updateStatus("Ready. Double-click the map to place your scan circle.");
    }

    function placeCircle(center) {
      if (circle) {
        circle.setMap(null);
      }

      if (resizeMarker) {
        resizeMarker.setMap(null);
      }

      circle = new google.maps.Circle({
        map: map,
        center: center,
        radius: DEFAULT_RADIUS,
        clickable: false,
        draggable: false,
        editable: false,
        fillColor: "#2563eb",
        fillOpacity: 0.16,
        strokeColor: "#2563eb",
        strokeOpacity: 0.95,
        strokeWeight: 2
      });

      resizeMarker = new google.maps.Marker({
        map: map,
        position: getResizeMarkerPosition(center, DEFAULT_RADIUS),
        draggable: true,
        title: "Drag to resize scan circle"
      });

      resizeMarker.addListener("drag", function(event) {
        const newRadius = distanceMeters(
          circle.getCenter().lat(),
          circle.getCenter().lng(),
          event.latLng.lat(),
          event.latLng.lng()
        );

        circle.setRadius(newRadius);
        updateRadiusLabel(newRadius);
      });

      resizeMarker.addListener("dragend", function(event) {
        const newRadius = circle.getRadius();
        resizeMarker.setPosition(getResizeMarkerPosition(circle.getCenter(), newRadius));
      });

      updateRadiusLabel(DEFAULT_RADIUS);
      updateStatus("Circle placed. Drag the outside marker to resize it.");
    }

    function getResizeMarkerPosition(center, radiusMeters) {
      const lat = center.lat();
      const lng = center.lng();
      const lngOffset = metersToLng(radiusMeters, lat);

      return {
        lat: lat,
        lng: lng + lngOffset
      };
    }

    function updateRadiusLabel(radius) {
      document.getElementById("radiusLabel").textContent = `${Math.round(radius)} meters`;
    }

    function removeCircle() {
      if (circle) {
        circle.setMap(null);
        circle = null;
      }

      if (resizeMarker) {
        resizeMarker.setMap(null);
        resizeMarker = null;
      }

      document.getElementById("radiusLabel").textContent = "Not placed";
      updateStatus("Circle removed. Double-click the map to place a new one.");
    }

    function togglePanel() {
      const panel = document.getElementById("panel");
      const button = document.getElementById("panelToggle");

      panel.classList.toggle("closed");
      button.textContent = panel.classList.contains("closed") ? "Show" : "Hide";
    }

    function updateStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function getDensitySettings() {
      const density = document.getElementById("densitySelect").value;

      if (density === "fast") {
        return { gridStepMultiplier: 0.9, searchRadiusMultiplier: 0.9 };
      }

      if (density === "deep") {
        return { gridStepMultiplier: 0.45, searchRadiusMultiplier: 0.7 };
      }

      return { gridStepMultiplier: 0.65, searchRadiusMultiplier: 0.8 };
    }

    function metersToLat(meters) {
      return meters / 111320;
    }

    function metersToLng(meters, latitude) {
      return meters / (111320 * Math.cos(latitude * Math.PI / 180));
    }

    function distanceMeters(lat1, lng1, lat2, lng2) {
      const earthRadius = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadius * c;
    }

    function generateSearchPoints(center, radiusMeters) {
      const settings = getDensitySettings();

      const searchRadius = Math.max(60, Math.min(500, radiusMeters * settings.searchRadiusMultiplier));
      const stepMeters = searchRadius * settings.gridStepMultiplier;

      const centerLat = center.lat();
      const centerLng = center.lng();

      const latStep = metersToLat(stepMeters);
      const lngStep = metersToLng(stepMeters, centerLat);

      const latRadius = metersToLat(radiusMeters);
      const lngRadius = metersToLng(radiusMeters, centerLat);

      const points = [];

      for (let lat = centerLat - latRadius; lat <= centerLat + latRadius; lat += latStep) {
        for (let lng = centerLng - lngRadius; lng <= centerLng + lngRadius; lng += lngStep) {
          const distance = distanceMeters(centerLat, centerLng, lat, lng);

          if (distance <= radiusMeters) {
            points.push({
              location: new google.maps.LatLng(lat, lng),
              radius: searchRadius
            });
          }
        }
      }

      points.push({ location: center, radius: searchRadius });
      return points;
    }

    async function scanCircle() {
      if (!circle) {
        alert("Double-click the map to place a circle first.");
        return;
      }

      clearResults();

      const scannedCenter = circle.getCenter();
      const radius = circle.getRadius();
      const searchPoints = generateSearchPoints(scannedCenter, radius);

      updateStatus(`Scanning ${searchPoints.length} points...`);

      for (let i = 0; i < searchPoints.length; i++) {
        updateStatus(`Scanning point ${i + 1} of ${searchPoints.length}...`);
        await nearbySearch(searchPoints[i].location, searchPoints[i].radius);
        await wait(350);
      }

      updateStatus(`Finished. Found ${allBusinesses.length} unique businesses.`);
      renderResults();
    }

    function nearbySearch(location, radius) {
      return new Promise((resolve) => {
        const request = {
          location: location,
          radius: radius,
          type: "establishment"
        };

        placesService.nearbySearch(request, async function(results, status, pagination) {
          if (status === google.maps.places.PlacesServiceStatus.OK && results) {
            for (const place of results) {
              if (!place.place_id || seenPlaceIds.has(place.place_id)) {
                continue;
              }

              seenPlaceIds.add(place.place_id);

              const details = await getPlaceDetails(place.place_id);

              if (details) {
                allBusinesses.push(details);
              }

              await wait(120);
            }

            if (pagination && pagination.hasNextPage) {
              await wait(2200);
              pagination.nextPage();
            }
          }

          resolve();
        });
      });
    }

    function getPlaceDetails(placeId) {
      return new Promise((resolve) => {
        const request = {
          placeId: placeId,
          fields: [
            "place_id",
            "name",
            "formatted_address",
            "geometry",
            "formatted_phone_number",
            "international_phone_number",
            "website",
            "url",
            "rating",
            "user_ratings_total",
            "business_status",
            "types",
            "reviews"
          ]
        };

        placesService.getDetails(request, function(place, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK && place) {
            const reviewInfo = getLatestReviewInfo(place.reviews);

            resolve({
              placeId: place.place_id || "",
              name: place.name || "",
              address: place.formatted_address || "",
              phone: place.formatted_phone_number || place.international_phone_number || "",
              website: place.website || "",
              googleMapsUrl: place.url || "",
              rating: place.rating || "",
              reviewCount: place.user_ratings_total || "",
              businessStatus: place.business_status || "",
              types: place.types ? place.types.join(", ") : "",
              latitude: place.geometry && place.geometry.location ? place.geometry.location.lat() : "",
              longitude: place.geometry && place.geometry.location ? place.geometry.location.lng() : "",
              latestReviewDate: reviewInfo.dateText,
              latestReviewTimestamp: reviewInfo.timestamp
            });
          } else {
            resolve(null);
          }
        });
      });
    }

    function getLatestReviewInfo(reviews) {
      if (!reviews || reviews.length === 0) {
        return {
          dateText: "No review date provided",
          timestamp: 0
        };
      }

      let newestTime = 0;

      for (const review of reviews) {
        if (review.time && review.time > newestTime) {
          newestTime = review.time;
        }
      }

      if (!newestTime) {
        return {
          dateText: "No review date provided",
          timestamp: 0
        };
      }

      return {
        dateText: new Date(newestTime * 1000).toLocaleDateString(),
        timestamp: newestTime
      };
    }

    function renderResults() {
      const resultsDiv = document.getElementById("results");
      const countSpan = document.getElementById("resultCount");
      const sortValue = document.getElementById("sortSelect").value;
      const nameSearch = document.getElementById("nameSearch").value.toLowerCase().trim();
      const addressSearch = document.getElementById("addressSearch").value.toLowerCase().trim();

      clearMarkers();

      let businesses = [...allBusinesses];

      businesses = businesses.filter(function(business) {
        const nameMatch = business.name.toLowerCase().includes(nameSearch);
        const addressMatch = business.address.toLowerCase().includes(addressSearch);
        return nameMatch && addressMatch;
      });

      businesses.sort(function(a, b) {
        if (sortValue === "name-asc") return a.name.localeCompare(b.name);
        if (sortValue === "name-desc") return b.name.localeCompare(a.name);
        if (sortValue === "address-asc") return a.address.localeCompare(b.address);
        if (sortValue === "address-desc") return b.address.localeCompare(a.address);
        if (sortValue === "rating-desc") return Number(b.rating || 0) - Number(a.rating || 0);
        if (sortValue === "rating-asc") return Number(a.rating || 0) - Number(b.rating || 0);
        if (sortValue === "review-desc") return Number(b.latestReviewTimestamp || 0) - Number(a.latestReviewTimestamp || 0);
        if (sortValue === "review-asc") return Number(a.latestReviewTimestamp || 0) - Number(b.latestReviewTimestamp || 0);
        return 0;
      });

      countSpan.textContent = businesses.length;
      resultsDiv.innerHTML = "";

      for (const business of businesses) {
        createMarker(business);

        const card = document.createElement("div");
        card.className = "business-card";

        const websiteText = business.website
          ? `<span class="has-website">Has website</span><br><a href="${escapeHtml(business.website)}" target="_blank">${escapeHtml(business.website)}</a>`
          : `<span class="missing">No website found</span>`;

        card.innerHTML = `
          <strong>${escapeHtml(business.name)}</strong><br>
          ${escapeHtml(business.address)}<br><br>

          Phone: ${escapeHtml(business.phone || "Not found")}<br>
          Website: ${websiteText}<br>
          Rating: ${escapeHtml(String(business.rating || "Not found"))}
          ${business.reviewCount ? ` (${escapeHtml(String(business.reviewCount))} reviews)` : ""}<br>
          Last Review Date: ${escapeHtml(business.latestReviewDate || "Not found")}<br>
          Status: ${escapeHtml(business.businessStatus || "Not found")}<br>
          Types: ${escapeHtml(business.types || "Not found")}<br>

          ${business.googleMapsUrl ? `<br><a href="${escapeHtml(business.googleMapsUrl)}" target="_blank">Open in Google Maps</a>` : ""}
        `;

        card.addEventListener("mouseenter", function() {
          highlightBusiness(business);
        });

        card.addEventListener("click", function() {
          highlightBusiness(business);
          map.panTo({ lat: Number(business.latitude), lng: Number(business.longitude) });
          map.setZoom(Math.max(map.getZoom(), 17));
        });

        resultsDiv.appendChild(card);
      }
    }

    function createMarker(business) {
      if (!business.latitude || !business.longitude) return;

      const marker = new google.maps.Marker({
        map: map,
        position: {
          lat: Number(business.latitude),
          lng: Number(business.longitude)
        },
        title: business.name
      });

      marker.addListener("click", function() {
        showInfoWindow(business, marker);
      });

      business.marker = marker;
      markers.push(marker);
    }

    function highlightBusiness(business) {
      if (!business.marker) return;

      business.marker.setAnimation(google.maps.Animation.BOUNCE);

      setTimeout(function() {
        if (business.marker) {
          business.marker.setAnimation(null);
        }
      }, 700);

      showInfoWindow(business, business.marker);
    }

    function showInfoWindow(business, marker) {
      if (activeInfoWindow) {
        activeInfoWindow.close();
      }

      activeInfoWindow = new google.maps.InfoWindow({
        content: `
          <strong>${escapeHtml(business.name)}</strong><br>
          ${escapeHtml(business.address)}<br>
          Rating: ${escapeHtml(String(business.rating || "Not found"))}<br>
          Last Review: ${escapeHtml(business.latestReviewDate || "Not found")}
        `
      });

      activeInfoWindow.open(map, marker);
    }

    function clearMarkers() {
      for (const marker of markers) {
        marker.setMap(null);
      }

      markers = [];

      if (activeInfoWindow) {
        activeInfoWindow.close();
        activeInfoWindow = null;
      }
    }

    function exportCSV() {
      if (allBusinesses.length === 0) {
        alert("No results to export.");
        return;
      }

      const headers = [
        "Business Name",
        "Address",
        "Phone",
        "Website",
        "Google Maps URL",
        "Rating",
        "Review Count",
        "Last Review Date",
        "Business Status",
        "Types",
        "Latitude",
        "Longitude"
      ];

      const rows = allBusinesses.map(business => [
        business.name,
        business.address,
        business.phone,
        business.website,
        business.googleMapsUrl,
        business.rating,
        business.reviewCount,
        business.latestReviewDate,
        business.businessStatus,
        business.types,
        business.latitude,
        business.longitude
      ]);

      let csvContent = "";
      csvContent += headers.map(csvEscape).join(",") + "\n";

      for (const row of rows) {
        csvContent += row.map(csvEscape).join(",") + "\n";
      }

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "business_scan_results.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    function clearResults() {
      allBusinesses = [];
      seenPlaceIds = new Set();
      clearMarkers();

      document.getElementById("results").innerHTML = "";
      document.getElementById("resultCount").textContent = "0";
      updateStatus("Results cleared.");
    }

    function csvEscape(value) {
      const text = String(value || "");
      const escaped = text.replace(/"/g, '""');
      return `"${escaped}"`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>

  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDUx6QIBzCxqNr3_2G1L2iSmn0dT9dRLro&libraries=places&callback=initMap">
  </script>
</body>
</html>
