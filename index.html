<!DOCTYPE html>
<html>
<head>
  <title>Business Area Scanner</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
    }

    #app {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #mapHint {
      position: fixed;
      left: 16px;
      bottom: 18px;
      z-index: 8;
      background: rgba(17, 24, 39, 0.92);
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.3);
      pointer-events: none;
    }

    #panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 390px;
      max-width: 95vw;
      height: 100vh;
      background: white;
      padding: 16px;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      box-shadow: -2px 0 12px rgba(0,0,0,0.2);
      transform: translateX(0);
      transition: transform 0.2s ease;
      z-index: 10;
      scroll-behavior: smooth;
    }

    #panel.closed {
      transform: translateX(100%);
    }

    .floating-button {
      position: fixed;
      z-index: 11;
      width: auto;
      min-width: 78px;
      padding: 12px 14px;
      background: #111827;
      color: white;
      border: 2px solid white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.35);
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
      touch-action: none;
    }

    #panelToggle {
      top: 16px;
      right: 390px;
      border-radius: 10px 0 0 10px;
    }

    #slideToggle {
      top: 66px;
      right: 390px;
      border-radius: 10px 0 0 10px;
      background: #374151;
      cursor: ew-resize;
    }

    h2 { margin-top: 0; }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input, select {
      width: 100%;
      padding: 9px;
      margin-top: 6px;
    }

    input[type="range"] {
      padding: 0;
    }

    button {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 7px;
    }

    button:hover { opacity: 0.92; }

    button.secondary { background: #4b5563; }
    button.danger { background: #dc2626; }
    button.green { background: #16a34a; }
    button.settings { background: #7c3aed; }

    #status {
      margin-top: 12px;
      padding: 10px;
      background: #f1f5f9;
      border-radius: 6px;
      font-size: 14px;
    }

    #searchSettings {
      display: none;
      margin-top: 10px;
      padding: 12px;
      border-radius: 8px;
      background: #f8fafc;
      border: 1px solid #dbeafe;
    }

    #searchSettings.open {
      display: block;
    }

    #businessTypeBox {
      max-height: 220px;
      overflow-y: auto;
      margin-top: 8px;
      padding: 10px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: white;
    }

    .type-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      font-size: 14px;
      font-weight: normal;
      margin-top: 0;
    }

    .type-option input {
      width: auto;
      margin: 0;
    }

    #clearResultsButton {
      display: none;
    }

    #backToTopButton {
      display: none;
      position: sticky;
      top: 0;
      z-index: 20;
      background: #111827;
      margin-bottom: 10px;
    }

    .business-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .business-card:hover {
      background: #eef2ff;
      border-color: #2563eb;
    }

    .business-card.highlighted {
      background: #fef3c7;
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.35);
    }

    .business-card strong { font-size: 15px; }

    .missing {
      color: #dc2626;
      font-weight: bold;
    }

    .has-website {
      color: #16a34a;
      font-weight: bold;
    }

    a { word-break: break-word; }

    .info-window-content {
      max-width: 280px;
      font-size: 13px;
      line-height: 1.4;
    }

    .info-window-content strong {
      font-size: 15px;
    }

    @media (max-width: 700px) {
      #panel {
        top: auto;
        bottom: 0;
        right: 0;
        width: 100vw;
        max-width: 100vw;
        height: 58vh;
        border-left: none;
        border-top: 1px solid #ddd;
        transform: translateY(0);
      }

      #panel.closed {
        transform: translateY(100%);
      }

      #panelToggle {
        top: auto;
        bottom: 58vh;
        right: 12px;
        border-radius: 10px 10px 0 0;
      }

      #slideToggle {
        top: auto;
        bottom: calc(58vh + 52px);
        right: 12px;
        border-radius: 10px 10px 0 0;
        cursor: ns-resize;
      }

      #mapHint {
        left: 10px;
        right: 10px;
        bottom: 10px;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="map"></div>

    <div id="mapHint">Hint: double-click the map to place the scan circle</div>

    <div id="panel">
      <h2>Business Area Scanner</h2>

      <button id="settingsButton" class="settings" onclick="toggleSearchSettings()">Search Settings ↓</button>

      <div id="searchSettings">
        <label>Filter Business Type</label>
        <div id="businessTypeBox">
          <label class="type-option"><input type="checkbox" value="bakery" checked onchange="renderResults()">Bakery</label>
          <label class="type-option"><input type="checkbox" value="bank" checked onchange="renderResults()">Bank</label>
          <label class="type-option"><input type="checkbox" value="bar" checked onchange="renderResults()">Bar</label>
          <label class="type-option"><input type="checkbox" value="beauty_salon" checked onchange="renderResults()">Beauty Salon</label>
          <label class="type-option"><input type="checkbox" value="cafe" checked onchange="renderResults()">Cafe</label>
          <label class="type-option"><input type="checkbox" value="car_repair" checked onchange="renderResults()">Car Repair</label>
          <label class="type-option"><input type="checkbox" value="clothing_store" checked onchange="renderResults()">Clothing</label>
          <label class="type-option"><input type="checkbox" value="dentist" checked onchange="renderResults()">Dentist</label>
          <label class="type-option"><input type="checkbox" value="doctor" checked onchange="renderResults()">Doctor / Medical</label>
          <label class="type-option"><input type="checkbox" value="electronics_store" checked onchange="renderResults()">Electronics</label>
          <label class="type-option"><input type="checkbox" value="food" checked onchange="renderResults()">Food</label>
          <label class="type-option"><input type="checkbox" value="gym" checked onchange="renderResults()">Gym</label>
          <label class="type-option"><input type="checkbox" value="hair_care" checked onchange="renderResults()">Hair Care</label>
          <label class="type-option"><input type="checkbox" value="home_goods_store" checked onchange="renderResults()">Home Goods</label>
          <label class="type-option"><input type="checkbox" value="liquor_store" checked onchange="renderResults()">Liquor</label>
          <label class="type-option"><input type="checkbox" value="meal_takeaway" checked onchange="renderResults()">Meal Takeaway</label>
          <label class="type-option"><input type="checkbox" value="pharmacy" checked onchange="renderResults()">Pharmacy</label>
          <label class="type-option"><input type="checkbox" value="restaurant" checked onchange="renderResults()">Restaurant</label>
          <label class="type-option"><input type="checkbox" value="store" checked onchange="renderResults()">Store</label>
          <label class="type-option"><input type="checkbox" value="supermarket" checked onchange="renderResults()">Supermarket</label>
        </div>

        <button onclick="selectAllBusinessTypes()" class="secondary">Select All Types</button>
        <button onclick="unselectAllBusinessTypes()" class="secondary">Unselect All Types</button>

        <label>Search by Business Name</label>
        <input id="nameSearch" placeholder="Example: Starbucks" oninput="renderResults()" />

        <label>Search by Address</label>
        <input id="addressSearch" placeholder="Example: Brooklyn" oninput="renderResults()" />

        <label>Scan Density</label>
        <select id="densitySelect">
          <option value="fast">Fast / wider scan</option>
          <option value="normal" selected>Normal</option>
          <option value="deep">Deep / slower scan</option>
        </select>

        <label>Sort Results</label>
        <select id="sortSelect" onchange="renderResults()">
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
          <option value="address-asc">Address A-Z</option>
          <option value="address-desc">Address Z-A</option>
          <option value="rating-desc">Rating High-Low</option>
          <option value="rating-asc">Rating Low-High</option>
          <option value="review-desc">Last Review Newest-Oldest</option>
          <option value="review-asc">Last Review Oldest-Newest</option>
          <option value="has-website">Has Website</option>
          <option value="no-website">Doesn't Have Website</option>
        </select>

        <button onclick="exportCSV()" class="green">Export CSV</button>
      </div>

      <p>
        Double-click the map to place the scan circle. Drag the center dot to move it, drag the outside handle to resize it, or use the slider below.
      </p>

      <label>Circle Radius: <span id="radiusLabel">500 meters</span></label>
      <input id="radiusSlider" type="range" min="50" max="3000" step="50" value="500" />

      <button onclick="scanCircle()">Scan Circle</button>
      <button onclick="removeCircle()" class="danger">Remove Circle</button>

      <div id="status">Double-click the map to place your scan circle.</div>

      <button id="clearResultsButton" onclick="clearResults()" class="danger">Clear Results</button>

      <h3>Results: <span id="resultCount">0</span></h3>
      <button id="backToTopButton" onclick="scrollPanelToTop()">Back To Top</button>
      <div id="results"></div>
    </div>

    <button id="panelToggle" class="floating-button" onclick="togglePanel()">Hide</button>
    <button id="slideToggle" class="floating-button">Slide</button>
  </div>

  <script>
    let map;
    let circle = null;
    let centerMarker = null;
    let resizeMarker = null;
    let placesService;

    let allBusinesses = [];
    let seenPlaceIds = new Set();
    let markers = [];
    let activeInfoWindow = null;
    let hoverInfoWindow = null;
    let currentHoverMarker = null;
    let hoverCloseTimer = null;

    let isSlidingPanel = false;
    let savedCircleRadius = 500;

    let lastMapClickTime = 0;
    const CUSTOM_DOUBLE_CLICK_MS = 850;

    const DEFAULT_CENTER = { lat: 40.7128, lng: -74.0060 };
    const MIN_PANEL_WIDTH = 0;
    const MAX_PANEL_WIDTH = 760;
    const MIN_PANEL_HEIGHT = 0;

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: DEFAULT_CENTER,
        zoom: 15,
        mapTypeId: "roadmap",
        mapTypeControl: true,
        streetViewControl: true,
        fullscreenControl: true,
        disableDoubleClickZoom: true
      });

      placesService = new google.maps.places.PlacesService(map);

      map.addListener("click", function(event) {
        const now = Date.now();

        if (now - lastMapClickTime <= CUSTOM_DOUBLE_CLICK_MS) {
          placeCircle(event.latLng);
          lastMapClickTime = 0;
        } else {
          lastMapClickTime = now;
        }
      });

      document.getElementById("radiusSlider").addEventListener("input", function() {
        const newRadius = Number(this.value);
        savedCircleRadius = newRadius;
        updateRadiusLabel(newRadius);

        if (circle) {
          circle.setRadius(newRadius);
          resizeMarker.setPosition(getResizeMarkerPosition(circle.getCenter(), newRadius));
        }
      });

      document.getElementById("panel").addEventListener("scroll", updateBackToTopButton);

      updateRadiusLabel(savedCircleRadius);
      setupPanelSlider();
      updateFloatingButtons();
      updateStatus("Ready. Double-click the map to place your scan circle.");
    }

    function setupPanelSlider() {
      const slideButton = document.getElementById("slideToggle");

      slideButton.addEventListener("pointerdown", function(event) {
        event.preventDefault();
        isSlidingPanel = true;
        document.getElementById("panel").style.transition = "none";
        slideButton.setPointerCapture(event.pointerId);
      });

      slideButton.addEventListener("pointermove", function(event) {
        if (!isSlidingPanel) return;

        const panel = document.getElementById("panel");

        if (window.innerWidth <= 700) {
          const newHeight = window.innerHeight - event.clientY;
          const clampedHeight = Math.max(MIN_PANEL_HEIGHT, Math.min(window.innerHeight * 0.9, newHeight));

          panel.classList.remove("closed");
          panel.style.height = clampedHeight + "px";

          if (clampedHeight <= 10) {
            panel.classList.add("closed");
            document.getElementById("panelToggle").textContent = "Show";
          } else {
            document.getElementById("panelToggle").textContent = "Hide";
          }
        } else {
          const newWidth = window.innerWidth - event.clientX;
          const clampedWidth = Math.max(MIN_PANEL_WIDTH, Math.min(MAX_PANEL_WIDTH, newWidth));

          panel.classList.remove("closed");
          panel.style.width = clampedWidth + "px";

          if (clampedWidth <= 10) {
            panel.classList.add("closed");
            document.getElementById("panelToggle").textContent = "Show";
          } else {
            document.getElementById("panelToggle").textContent = "Hide";
          }
        }

        updateFloatingButtons();
      });

      slideButton.addEventListener("pointerup", function(event) {
        isSlidingPanel = false;
        document.getElementById("panel").style.transition = "transform 0.2s ease";
        slideButton.releasePointerCapture(event.pointerId);
        updateFloatingButtons();
      });

      slideButton.addEventListener("pointercancel", function() {
        isSlidingPanel = false;
        document.getElementById("panel").style.transition = "transform 0.2s ease";
        updateFloatingButtons();
      });
    }

    function updateFloatingButtons() {
      const panel = document.getElementById("panel");
      const panelToggle = document.getElementById("panelToggle");
      const slideToggle = document.getElementById("slideToggle");

      if (window.innerWidth <= 700) {
        const panelHeight = panel.classList.contains("closed") ? 0 : panel.offsetHeight;

        panelToggle.style.bottom = panelHeight + "px";
        slideToggle.style.bottom = (panelHeight + 52) + "px";

        panelToggle.style.right = "12px";
        slideToggle.style.right = "12px";
      } else {
        const panelWidth = panel.classList.contains("closed") ? 0 : panel.offsetWidth;

        panelToggle.style.right = panelWidth + "px";
        slideToggle.style.right = panelWidth + "px";
      }
    }

    window.addEventListener("resize", updateFloatingButtons);

    function togglePanel() {
      const panel = document.getElementById("panel");
      const hideButton = document.getElementById("panelToggle");

      panel.classList.toggle("closed");
      hideButton.textContent = panel.classList.contains("closed") ? "Show" : "Hide";
      updateFloatingButtons();
    }

    function toggleSearchSettings() {
      const settings = document.getElementById("searchSettings");
      const button = document.getElementById("settingsButton");

      settings.classList.toggle("open");
      button.textContent = settings.classList.contains("open") ? "Search Settings ↑" : "Search Settings ↓";
    }

    function selectAllBusinessTypes() {
      const checkboxes = document.querySelectorAll("#businessTypeBox input[type='checkbox']");
      checkboxes.forEach(function(checkbox) {
        checkbox.checked = true;
      });
      renderResults();
    }

    function unselectAllBusinessTypes() {
      const checkboxes = document.querySelectorAll("#businessTypeBox input[type='checkbox']");
      checkboxes.forEach(function(checkbox) {
        checkbox.checked = false;
      });
      renderResults();
    }

    function getSelectedBusinessTypes() {
      const checkboxes = document.querySelectorAll("#businessTypeBox input[type='checkbox']:checked");
      return Array.from(checkboxes).map(function(checkbox) {
        return checkbox.value;
      });
    }

    function businessMatchesSelectedType(business, selectedTypes) {
      if (selectedTypes.length === 0) {
        return false;
      }

      if (!business.typesRaw || business.typesRaw.length === 0) {
        return false;
      }

      return business.typesRaw.some(function(type) {
        return selectedTypes.includes(type);
      });
    }

    function placeCircle(center) {
      removeCircleOnly();

      const radiusToUse = savedCircleRadius;

      circle = new google.maps.Circle({
        map: map,
        center: center,
        radius: radiusToUse,
        clickable: false,
        draggable: false,
        editable: false,
        fillColor: "#2563eb",
        fillOpacity: 0.16,
        strokeColor: "#2563eb",
        strokeOpacity: 0.95,
        strokeWeight: 2
      });

      centerMarker = new google.maps.Marker({
        map: map,
        position: center,
        draggable: true,
        title: "Drag to move scan circle",
        icon: {
          url: makeCenterDotIcon(),
          scaledSize: new google.maps.Size(24, 24),
          anchor: new google.maps.Point(12, 12)
        }
      });

      resizeMarker = new google.maps.Marker({
        map: map,
        position: getResizeMarkerPosition(center, radiusToUse),
        draggable: true,
        title: "Drag to resize scan circle",
        icon: {
          url: makeResizeHandleIcon(),
          scaledSize: new google.maps.Size(32, 32),
          anchor: new google.maps.Point(16, 16)
        }
      });

      centerMarker.addListener("drag", function(event) {
        const newCenter = event.latLng;
        circle.setCenter(newCenter);
        resizeMarker.setPosition(getResizeMarkerPosition(newCenter, circle.getRadius()));
      });

      centerMarker.addListener("dragend", function(event) {
        const newCenter = event.latLng;
        circle.setCenter(newCenter);
        resizeMarker.setPosition(getResizeMarkerPosition(newCenter, circle.getRadius()));
      });

      resizeMarker.addListener("drag", function(event) {
        const newRadius = distanceMeters(
          circle.getCenter().lat(),
          circle.getCenter().lng(),
          event.latLng.lat(),
          event.latLng.lng()
        );

        savedCircleRadius = Math.max(50, Math.min(3000, Math.round(newRadius)));
        circle.setRadius(savedCircleRadius);
        document.getElementById("radiusSlider").value = savedCircleRadius;
        updateRadiusLabel(savedCircleRadius);
      });

      resizeMarker.addListener("dragend", function() {
        savedCircleRadius = Math.round(circle.getRadius());
        resizeMarker.setPosition(getResizeMarkerPosition(circle.getCenter(), savedCircleRadius));
        document.getElementById("radiusSlider").value = savedCircleRadius;
        updateRadiusLabel(savedCircleRadius);
      });

      document.getElementById("radiusSlider").value = radiusToUse;
      updateRadiusLabel(radiusToUse);
      updateStatus("Circle placed. Drag the center dot to move it or drag the outside handle to resize it.");
    }

    function makeCenterDotIcon() {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="8" fill="#111827" stroke="white" stroke-width="3"/>
          <circle cx="12" cy="12" r="3" fill="white"/>
        </svg>
      `;

      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function makeResizeHandleIcon() {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
          <circle cx="16" cy="16" r="13" fill="white" stroke="#2563eb" stroke-width="4"/>
          <path d="M10 16H22" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
          <path d="M16 10V22" stroke="#2563eb" stroke-width="3" stroke-linecap="round"/>
          <path d="M9 9L5 5M23 9L27 5M9 23L5 27M23 23L27 27" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
        </svg>
      `;

      return "data:image/svg+xml;charset=UTF-8," + encodeURIComponent(svg);
    }

    function getResizeMarkerPosition(center, radiusMeters) {
      const lat = center.lat();
      const lng = center.lng();
      const lngOffset = metersToLng(radiusMeters, lat);

      return {
        lat: lat,
        lng: lng + lngOffset
      };
    }

    function updateRadiusLabel(radius) {
      document.getElementById("radiusLabel").textContent = `${Math.round(radius)} meters`;
    }

    function removeCircleOnly() {
      if (circle) {
        circle.setMap(null);
        circle = null;
      }

      if (centerMarker) {
        centerMarker.setMap(null);
        centerMarker = null;
      }

      if (resizeMarker) {
        resizeMarker.setMap(null);
        resizeMarker = null;
      }
    }

    function removeCircle() {
      removeCircleOnly();
      updateRadiusLabel(savedCircleRadius);
      document.getElementById("radiusSlider").value = savedCircleRadius;
      updateStatus("Circle removed. Double-click the map to place a new one.");
    }

    function updateStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function getDensitySettings() {
      const density = document.getElementById("densitySelect").value;

      if (density === "fast") {
        return { gridStepMultiplier: 0.9, searchRadiusMultiplier: 0.9 };
      }

      if (density === "deep") {
        return { gridStepMultiplier: 0.45, searchRadiusMultiplier: 0.7 };
      }

      return { gridStepMultiplier: 0.65, searchRadiusMultiplier: 0.8 };
    }

    function metersToLat(meters) {
      return meters / 111320;
    }

    function metersToLng(meters, latitude) {
      return meters / (111320 * Math.cos(latitude * Math.PI / 180));
    }

    function distanceMeters(lat1, lng1, lat2, lng2) {
      const earthRadius = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadius * c;
    }

    function generateSearchPoints(center, radiusMeters) {
      const settings = getDensitySettings();

      const searchRadius = Math.max(60, Math.min(500, radiusMeters * settings.searchRadiusMultiplier));
      const stepMeters = searchRadius * settings.gridStepMultiplier;

      const centerLat = center.lat();
      const centerLng = center.lng();

      const latStep = metersToLat(stepMeters);
      const lngStep = metersToLng(stepMeters, centerLat);

      const latRadius = metersToLat(radiusMeters);
      const lngRadius = metersToLng(radiusMeters, centerLat);

      const points = [];

      for (let lat = centerLat - latRadius; lat <= centerLat + latRadius; lat += latStep) {
        for (let lng = centerLng - lngRadius; lng <= centerLng + lngRadius; lng += lngStep) {
          const distance = distanceMeters(centerLat, centerLng, lat, lng);

          if (distance <= radiusMeters) {
            points.push({
              location: new google.maps.LatLng(lat, lng),
              radius: searchRadius
            });
          }
        }
      }

      points.push({ location: center, radius: searchRadius });
      return points;
    }

    async function scanCircle() {
      if (!circle) {
        alert("Double-click the map to place a circle first.");
        return;
      }

      clearResults();

      const scannedCenter = circle.getCenter();
      const radius = circle.getRadius();
      const searchPoints = generateSearchPoints(scannedCenter, radius);

      updateStatus(`Scanning ${searchPoints.length} points...`);

      for (let i = 0; i < searchPoints.length; i++) {
        updateStatus(`Scanning point ${i + 1} of ${searchPoints.length}...`);
        await nearbySearch(searchPoints[i].location, searchPoints[i].radius);
        await wait(350);
      }

      updateStatus(`Finished. Found ${allBusinesses.length} unique businesses.`);
      document.getElementById("clearResultsButton").style.display = allBusinesses.length > 0 ? "block" : "none";
      renderResults();
    }

    function nearbySearch(location, radius) {
      return new Promise((resolve) => {
        const request = {
          location: location,
          radius: radius,
          type: "establishment"
        };

        placesService.nearbySearch(request, async function(results, status, pagination) {
          if (status === google.maps.places.PlacesServiceStatus.OK && results) {
            for (const place of results) {
              if (!place.place_id || seenPlaceIds.has(place.place_id)) continue;

              seenPlaceIds.add(place.place_id);

              const details = await getPlaceDetails(place.place_id);

              if (details) allBusinesses.push(details);

              await wait(120);
            }

            if (pagination && pagination.hasNextPage) {
              await wait(2200);
              pagination.nextPage();
            }
          }

          resolve();
        });
      });
    }

    function getPlaceDetails(placeId) {
      return new Promise((resolve) => {
        const request = {
          placeId: placeId,
          fields: [
            "place_id",
            "name",
            "formatted_address",
            "geometry",
            "formatted_phone_number",
            "international_phone_number",
            "website",
            "url",
            "rating",
            "user_ratings_total",
            "business_status",
            "types",
            "reviews"
          ]
        };

        placesService.getDetails(request, function(place, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK && place) {
            const reviewInfo = getLatestReviewInfo(place.reviews);

            resolve({
              placeId: place.place_id || "",
              name: place.name || "",
              address: place.formatted_address || "",
              phone: place.formatted_phone_number || place.international_phone_number || "",
              website: place.website || "",
              googleMapsUrl: place.url || "",
              rating: place.rating || "",
              reviewCount: place.user_ratings_total || "",
              businessStatus: place.business_status || "",
              types: place.types ? place.types.join(", ") : "",
              typesRaw: place.types || [],
              latitude: place.geometry && place.geometry.location ? place.geometry.location.lat() : "",
              longitude: place.geometry && place.geometry.location ? place.geometry.location.lng() : "",
              latestReviewDate: reviewInfo.dateText,
              latestReviewTimestamp: reviewInfo.timestamp
            });
          } else {
            resolve(null);
          }
        });
      });
    }

    function getLatestReviewInfo(reviews) {
      if (!reviews || reviews.length === 0) {
        return {
          dateText: "No review date provided",
          timestamp: 0
        };
      }

      let newestTime = 0;

      for (const review of reviews) {
        if (review.time && review.time > newestTime) {
          newestTime = review.time;
        }
      }

      if (!newestTime) {
        return {
          dateText: "No review date provided",
          timestamp: 0
        };
      }

      return {
        dateText: new Date(newestTime * 1000).toLocaleDateString(),
        timestamp: newestTime
      };
    }

    function renderResults() {
      const resultsDiv = document.getElementById("results");
      const countSpan = document.getElementById("resultCount");
      const sortValue = document.getElementById("sortSelect").value;
      const nameSearch = document.getElementById("nameSearch").value.toLowerCase().trim();
      const addressSearch = document.getElementById("addressSearch").value.toLowerCase().trim();
      const selectedBusinessTypes = getSelectedBusinessTypes();

      clearMarkers();

      let businesses = [...allBusinesses];

      businesses = businesses.filter(function(business) {
        const nameMatch = business.name.toLowerCase().includes(nameSearch);
        const addressMatch = business.address.toLowerCase().includes(addressSearch);
        const typeMatch = businessMatchesSelectedType(business, selectedBusinessTypes);

        return nameMatch && addressMatch && typeMatch;
      });

      businesses.sort(function(a, b) {
        if (sortValue === "name-asc") return a.name.localeCompare(b.name);
        if (sortValue === "name-desc") return b.name.localeCompare(a.name);
        if (sortValue === "address-asc") return a.address.localeCompare(b.address);
        if (sortValue === "address-desc") return b.address.localeCompare(a.address);
        if (sortValue === "rating-desc") return Number(b.rating || 0) - Number(a.rating || 0);
        if (sortValue === "rating-asc") return Number(a.rating || 0) - Number(b.rating || 0);
        if (sortValue === "review-desc") return Number(b.latestReviewTimestamp || 0) - Number(a.latestReviewTimestamp || 0);
        if (sortValue === "review-asc") return Number(a.latestReviewTimestamp || 0) - Number(b.latestReviewTimestamp || 0);

        if (sortValue === "has-website") {
          return Number(Boolean(b.website)) - Number(Boolean(a.website));
        }

        if (sortValue === "no-website") {
          return Number(!b.website) - Number(!a.website);
        }

        return 0;
      });

      countSpan.textContent = businesses.length;
      resultsDiv.innerHTML = "";

      for (const business of businesses) {
        createMarker(business);

        const card = document.createElement("div");
        card.className = "business-card";
        card.id = `business-card-${business.placeId}`;

        const websiteText = business.website
          ? `<span class="has-website">Has website</span><br><a href="${escapeHtml(business.website)}" target="_blank">${escapeHtml(business.website)}</a>`
          : `<span class="missing">No website found</span>`;

        card.innerHTML = `
          <strong>${escapeHtml(business.name)}</strong><br>
          ${escapeHtml(business.address)}<br><br>

          Phone: ${escapeHtml(business.phone || "Not found")}<br>
          Website: ${websiteText}<br>
          Rating: ${escapeHtml(String(business.rating || "Not found"))}
          ${business.reviewCount ? ` (${escapeHtml(String(business.reviewCount))} reviews)` : ""}<br>
          Last Review Date: ${escapeHtml(business.latestReviewDate || "Not found")}<br>
          Status: ${escapeHtml(business.businessStatus || "Not found")}<br>
          Types: ${escapeHtml(business.types || "Not found")}<br>

          ${business.googleMapsUrl ? `<br><a href="${escapeHtml(business.googleMapsUrl)}" target="_blank">Open in Google Maps</a>` : ""}
        `;

        card.addEventListener("mouseenter", function() {
          highlightBusiness(business);
        });

        card.addEventListener("click", function() {
          highlightBusiness(business);
        });

        resultsDiv.appendChild(card);
      }

      updateBackToTopButton();
    }

    function createMarker(business) {
      if (!business.latitude || !business.longitude) return;

      const marker = new google.maps.Marker({
        map: map,
        position: {
          lat: Number(business.latitude),
          lng: Number(business.longitude)
        },
        title: business.name
      });

      marker.addListener("mouseover", function() {
        currentHoverMarker = marker;

        if (hoverCloseTimer) {
          clearTimeout(hoverCloseTimer);
          hoverCloseTimer = null;
        }

        showHoverInfoWindow(business, marker);
      });

      marker.addListener("mouseout", function() {
        hoverCloseTimer = setTimeout(function() {
          if (currentHoverMarker === marker && hoverInfoWindow) {
            hoverInfoWindow.close();
            hoverInfoWindow = null;
            currentHoverMarker = null;
          }
        }, 120);
      });

      marker.addListener("click", function() {
        showClickInfoWindow(business, marker);
        scrollToBusinessListing(business);
      });

      business.marker = marker;
      markers.push(marker);
    }

    function highlightBusiness(business) {
      if (!business.marker) return;

      business.marker.setAnimation(google.maps.Animation.BOUNCE);

      setTimeout(function() {
        if (business.marker) business.marker.setAnimation(null);
      }, 700);

      showClickInfoWindow(business, business.marker);
    }

    function scrollToBusinessListing(business) {
      const panel = document.getElementById("panel");
      const hideButton = document.getElementById("panelToggle");

      if (panel.classList.contains("closed")) {
        panel.classList.remove("closed");
        hideButton.textContent = "Hide";
        updateFloatingButtons();
      }

      const card = document.getElementById(`business-card-${business.placeId}`);

      if (!card) {
        return;
      }

      card.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });

      setTimeout(function() {
        card.classList.add("highlighted");

        setTimeout(function() {
          card.classList.remove("highlighted");
        }, 1000);
      }, 700);
    }

    function buildInfoWindowContent(business) {
      const websiteSection = business.website
        ? `<span class="has-website">Has website</span><br><a href="${escapeHtml(business.website)}" target="_blank">${escapeHtml(business.website)}</a>`
        : `<span class="missing">No website found</span>`;

      return `
        <div class="info-window-content">
          <strong>${escapeHtml(business.name)}</strong><br>
          ${escapeHtml(business.address)}<br><br>

          Phone: ${escapeHtml(business.phone || "Not found")}<br>
          Website: ${websiteSection}<br>
          Rating: ${escapeHtml(String(business.rating || "Not found"))}
          ${business.reviewCount ? ` (${escapeHtml(String(business.reviewCount))} reviews)` : ""}<br>
          Last Review Date: ${escapeHtml(business.latestReviewDate || "Not found")}<br>
          Status: ${escapeHtml(business.businessStatus || "Not found")}<br>
          Types: ${escapeHtml(business.types || "Not found")}<br>

          ${business.googleMapsUrl ? `<br><a href="${escapeHtml(business.googleMapsUrl)}" target="_blank">Open in Google Maps</a>` : ""}
        </div>
      `;
    }

    function showHoverInfoWindow(business, marker) {
      if (activeInfoWindow) {
        activeInfoWindow.close();
        activeInfoWindow = null;
      }

      if (hoverInfoWindow) {
        hoverInfoWindow.close();
      }

      hoverInfoWindow = new google.maps.InfoWindow({
        content: buildInfoWindowContent(business),
        disableAutoPan: true
      });

      hoverInfoWindow.open(map, marker);
    }

    function showClickInfoWindow(business, marker) {
      if (hoverInfoWindow) {
        hoverInfoWindow.close();
        hoverInfoWindow = null;
        currentHoverMarker = null;
      }

      if (activeInfoWindow) {
        activeInfoWindow.close();
      }

      activeInfoWindow = new google.maps.InfoWindow({
        content: buildInfoWindowContent(business),
        disableAutoPan: true
      });

      activeInfoWindow.open(map, marker);
    }

    function clearMarkers() {
      for (const marker of markers) {
        marker.setMap(null);
      }

      markers = [];

      if (activeInfoWindow) {
        activeInfoWindow.close();
        activeInfoWindow = null;
      }

      if (hoverInfoWindow) {
        hoverInfoWindow.close();
        hoverInfoWindow = null;
      }

      currentHoverMarker = null;

      if (hoverCloseTimer) {
        clearTimeout(hoverCloseTimer);
        hoverCloseTimer = null;
      }
    }

    function updateBackToTopButton() {
      const panel = document.getElementById("panel");
      const button = document.getElementById("backToTopButton");

      if (panel.scrollTop > 350 && allBusinesses.length > 0) {
        button.style.display = "block";
      } else {
        button.style.display = "none";
      }
    }

    function scrollPanelToTop() {
      document.getElementById("panel").scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function exportCSV() {
      if (allBusinesses.length === 0) {
        alert("No results to export.");
        return;
      }

      const headers = [
        "Business Name",
        "Address",
        "Phone",
        "Website",
        "Google Maps URL",
        "Rating",
        "Review Count",
        "Last Review Date",
        "Business Status",
        "Types",
        "Latitude",
        "Longitude"
      ];

      const rows = allBusinesses.map(business => [
        business.name,
        business.address,
        business.phone,
        business.website,
        business.googleMapsUrl,
        business.rating,
        business.reviewCount,
        business.latestReviewDate,
        business.businessStatus,
        business.types,
        business.latitude,
        business.longitude
      ]);

      let csvContent = "";
      csvContent += headers.map(csvEscape).join(",") + "\n";

      for (const row of rows) {
        csvContent += row.map(csvEscape).join(",") + "\n";
      }

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "business_scan_results.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    function clearResults() {
      allBusinesses = [];
      seenPlaceIds = new Set();
      clearMarkers();

      document.getElementById("results").innerHTML = "";
      document.getElementById("resultCount").textContent = "0";
      document.getElementById("clearResultsButton").style.display = "none";
      document.getElementById("backToTopButton").style.display = "none";
      updateStatus("Results cleared.");
    }

    function csvEscape(value) {
      const text = String(value || "");
      const escaped = text.replace(/"/g, '""');
      return `"${escaped}"`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>
