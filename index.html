<!DOCTYPE html>
<html>
<head>
  <title>Business Area Scanner</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      overflow: hidden;
    }

    #app {
      height: 100vh;
      width: 100vw;
      position: relative;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 390px;
      max-width: 88vw;
      height: 100vh;
      background: white;
      padding: 16px;
      overflow-y: auto;
      border-left: 1px solid #ddd;
      box-shadow: -2px 0 12px rgba(0,0,0,0.2);
      transform: translateX(0);
      transition: transform 0.25s ease;
      z-index: 10;
    }

    #panel.closed {
      transform: translateX(100%);
    }

    #panelToggle {
      position: fixed;
      top: 16px;
      right: 390px;
      z-index: 11;
      width: auto;
      padding: 10px 12px;
      border-radius: 8px 0 0 8px;
      background: #111827;
    }

    #panel.closed + #panelToggle {
      right: 0;
    }

    h2 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 14px;
      font-weight: bold;
    }

    input,
    select {
      width: 100%;
      padding: 9px;
      margin-top: 6px;
    }

    input[type="range"] {
      padding: 0;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #555;
    }

    button.danger {
      background: #dc2626;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .row button {
      flex: 1;
    }

    #status {
      margin-top: 12px;
      padding: 10px;
      background: #f1f5f9;
      border-radius: 6px;
      font-size: 14px;
    }

    .business-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: #fafafa;
      font-size: 14px;
      cursor: pointer;
    }

    .business-card:hover {
      background: #eef2ff;
      border-color: #2563eb;
    }

    .business-card strong {
      font-size: 15px;
    }

    .missing {
      color: #dc2626;
      font-weight: bold;
    }

    .has-website {
      color: #16a34a;
      font-weight: bold;
    }

    a {
      word-break: break-word;
    }

    @media (max-width: 700px) {
      #panel {
        top: auto;
        bottom: 0;
        right: 0;
        width: 100vw;
        max-width: 100vw;
        height: 58vh;
        border-left: none;
        border-top: 1px solid #ddd;
        transform: translateY(0);
      }

      #panel.closed {
        transform: translateY(calc(100% - 54px));
      }

      #panelToggle {
        top: auto;
        bottom: 58vh;
        right: 12px;
        border-radius: 8px 8px 0 0;
      }

      #panel.closed + #panelToggle {
        bottom: 54px;
        right: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="map"></div>

    <div id="panel">
      <h2>Business Area Scanner</h2>

      <p>
        The circle stays centered on the map. Move the map under it, adjust the radius, then scan.
      </p>

      <label>Circle Radius: <span id="radiusLabel">500</span> meters</label>
      <input id="radiusSlider" type="range" min="50" max="3000" step="50" value="500" />

      <label>Scan Density</label>
      <select id="densitySelect">
        <option value="fast">Fast / wider scan</option>
        <option value="normal" selected>Normal</option>
        <option value="deep">Deep / slower scan</option>
      </select>

      <div class="row">
        <button onclick="rotateLeft()">Rotate Left</button>
        <button onclick="rotateRight()">Rotate Right</button>
      </div>

      <button onclick="scanCircle()">Scan Center Circle</button>
      <button onclick="exportCSV()" class="secondary">Export CSV</button>
      <button onclick="clearResults()" class="danger">Clear Results</button>

      <div id="status">Move the map so the area is inside the center circle.</div>

      <label>Filter by Name</label>
      <input id="nameFilter" placeholder="Example: pizza" oninput="renderResults()" />

      <label>Filter by Address</label>
      <input id="addressFilter" placeholder="Example: Brooklyn" oninput="renderResults()" />

      <label>Minimum Rating</label>
      <select id="ratingFilter" onchange="renderResults()">
        <option value="0">Any rating</option>
        <option value="1">1.0+</option>
        <option value="2">2.0+</option>
        <option value="3">3.0+</option>
        <option value="4">4.0+</option>
        <option value="4.5">4.5+</option>
      </select>

      <h3>Results: <span id="resultCount">0</span></h3>
      <div id="results"></div>
    </div>

    <button id="panelToggle" onclick="togglePanel()">Hide</button>
  </div>

  <script>
    let map;
    let circle;
    let placesService;

    let allBusinesses = [];
    let seenPlaceIds = new Set();
    let markers = [];
    let activeInfoWindow = null;

    const DEFAULT_CENTER = { lat: 40.7128, lng: -74.0060 };

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: DEFAULT_CENTER,
        zoom: 15,
        mapTypeId: "roadmap",
        tilt: 45,
        heading: 0,
        mapTypeControl: true,
        streetViewControl: true,
        fullscreenControl: true
      });

      placesService = new google.maps.places.PlacesService(map);

      circle = new google.maps.Circle({
        map: map,
        center: map.getCenter(),
        radius: 500,
        clickable: false,
        draggable: false,
        editable: false,
        fillColor: "#2563eb",
        fillOpacity: 0.16,
        strokeColor: "#2563eb",
        strokeOpacity: 0.95,
        strokeWeight: 2
      });

      map.addListener("center_changed", function() {
        circle.setCenter(map.getCenter());
      });

      document.getElementById("radiusSlider").addEventListener("input", function() {
        const radius = Number(this.value);
        circle.setRadius(radius);
        document.getElementById("radiusLabel").textContent = radius;
      });

      updateStatus("Ready. Move the map so the area is inside the center circle.");
    }

    function togglePanel() {
      const panel = document.getElementById("panel");
      const button = document.getElementById("panelToggle");

      panel.classList.toggle("closed");
      button.textContent = panel.classList.contains("closed") ? "BASS" : "Hide";
    }

    function rotateLeft() {
      const currentHeading = map.getHeading() || 0;
      map.setHeading(currentHeading - 20);
    }

    function rotateRight() {
      const currentHeading = map.getHeading() || 0;
      map.setHeading(currentHeading + 20);
    }

    function updateStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function getDensitySettings() {
      const density = document.getElementById("densitySelect").value;

      if (density === "fast") {
        return {
          gridStepMultiplier: 0.9,
          searchRadiusMultiplier: 0.9
        };
      }

      if (density === "deep") {
        return {
          gridStepMultiplier: 0.45,
          searchRadiusMultiplier: 0.7
        };
      }

      return {
        gridStepMultiplier: 0.65,
        searchRadiusMultiplier: 0.8
      };
    }

    function metersToLat(meters) {
      return meters / 111320;
    }

    function metersToLng(meters, latitude) {
      return meters / (111320 * Math.cos(latitude * Math.PI / 180));
    }

    function distanceMeters(lat1, lng1, lat2, lng2) {
      const earthRadius = 6371000;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLng = (lng2 - lng1) * Math.PI / 180;

      const a =
        Math.sin(dLat / 2) * Math.sin(dLat / 2) +
        Math.cos(lat1 * Math.PI / 180) *
        Math.cos(lat2 * Math.PI / 180) *
        Math.sin(dLng / 2) *
        Math.sin(dLng / 2);

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return earthRadius * c;
    }

    function generateSearchPoints(center, radiusMeters) {
      const settings = getDensitySettings();

      const searchRadius = Math.max(60, Math.min(500, radiusMeters * settings.searchRadiusMultiplier));
      const stepMeters = searchRadius * settings.gridStepMultiplier;

      const centerLat = center.lat();
      const centerLng = center.lng();

      const latStep = metersToLat(stepMeters);
      const lngStep = metersToLng(stepMeters, centerLat);

      const latRadius = metersToLat(radiusMeters);
      const lngRadius = metersToLng(radiusMeters, centerLat);

      const points = [];

      for (let lat = centerLat - latRadius; lat <= centerLat + latRadius; lat += latStep) {
        for (let lng = centerLng - lngRadius; lng <= centerLng + lngRadius; lng += lngStep) {
          const distance = distanceMeters(centerLat, centerLng, lat, lng);

          if (distance <= radiusMeters) {
            points.push({
              location: new google.maps.LatLng(lat, lng),
              radius: searchRadius
            });
          }
        }
      }

      points.push({
        location: center,
        radius: searchRadius
      });

      return points;
    }

    async function scanCircle() {
      clearResults();

      const center = map.getCenter();
      const radius = circle.getRadius();
      const searchPoints = generateSearchPoints(center, radius);

      updateStatus(`Scanning ${searchPoints.length} points...`);

      for (let i = 0; i < searchPoints.length; i++) {
        updateStatus(`Scanning point ${i + 1} of ${searchPoints.length}...`);
        await nearbySearch(searchPoints[i].location, searchPoints[i].radius);
        await wait(350);
      }

      updateStatus(`Finished. Found ${allBusinesses.length} unique businesses.`);
      renderResults();
    }

    function nearbySearch(location, radius) {
      return new Promise((resolve) => {
        const request = {
          location: location,
          radius: radius,
          type: "establishment"
        };

        placesService.nearbySearch(request, async function(results, status, pagination) {
          if (status === google.maps.places.PlacesServiceStatus.OK && results) {
            for (const place of results) {
              if (!place.place_id || seenPlaceIds.has(place.place_id)) {
                continue;
              }

              seenPlaceIds.add(place.place_id);

              const details = await getPlaceDetails(place.place_id);

              if (details) {
                allBusinesses.push(details);
              }

              await wait(120);
            }

            if (pagination && pagination.hasNextPage) {
              await wait(2200);
              pagination.nextPage();
            }
          }

          resolve();
        });
      });
    }

    function getPlaceDetails(placeId) {
      return new Promise((resolve) => {
        const request = {
          placeId: placeId,
          fields: [
            "place_id",
            "name",
            "formatted_address",
            "geometry",
            "formatted_phone_number",
            "international_phone_number",
            "website",
            "url",
            "rating",
            "user_ratings_total",
            "business_status",
            "types",
            "reviews"
          ]
        };

        placesService.getDetails(request, function(place, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK && place) {
            const latestReviewDate = getLatestReviewDate(place.reviews);

            resolve({
              placeId: place.place_id || "",
              name: place.name || "",
              address: place.formatted_address || "",
              phone: place.formatted_phone_number || place.international_phone_number || "",
              website: place.website || "",
              googleMapsUrl: place.url || "",
              rating: place.rating || "",
              reviewCount: place.user_ratings_total || "",
              businessStatus: place.business_status || "",
              types: place.types ? place.types.join(", ") : "",
              latitude: place.geometry && place.geometry.location ? place.geometry.location.lat() : "",
              longitude: place.geometry && place.geometry.location ? place.geometry.location.lng() : "",
              latestReviewDate: latestReviewDate
            });
          } else {
            resolve(null);
          }
        });
      });
    }

    function getLatestReviewDate(reviews) {
      if (!reviews || reviews.length === 0) {
        return "No review date provided";
      }

      let newestTime = 0;

      for (const review of reviews) {
        if (review.time && review.time > newestTime) {
          newestTime = review.time;
        }
      }

      if (!newestTime) {
        return "No review date provided";
      }

      return new Date(newestTime * 1000).toLocaleDateString();
    }

    function renderResults() {
      const resultsDiv = document.getElementById("results");
      const countSpan = document.getElementById("resultCount");

      const nameFilter = document.getElementById("nameFilter").value.toLowerCase().trim();
      const addressFilter = document.getElementById("addressFilter").value.toLowerCase().trim();
      const ratingFilter = Number(document.getElementById("ratingFilter").value);

      clearMarkers();

      const filteredBusinesses = allBusinesses.filter(function(business) {
        const nameMatch = business.name.toLowerCase().includes(nameFilter);
        const addressMatch = business.address.toLowerCase().includes(addressFilter);
        const rating = Number(business.rating || 0);
        const ratingMatch = rating >= ratingFilter;

        return nameMatch && addressMatch && ratingMatch;
      });

      filteredBusinesses.sort((a, b) => {
        const aMissing = a.website ? 1 : 0;
        const bMissing = b.website ? 1 : 0;
        return aMissing - bMissing;
      });

      countSpan.textContent = filteredBusinesses.length;
      resultsDiv.innerHTML = "";

      for (const business of filteredBusinesses) {
        createMarker(business);

        const card = document.createElement("div");
        card.className = "business-card";

        const websiteText = business.website
          ? `<span class="has-website">Has website</span><br><a href="${escapeHtml(business.website)}" target="_blank">${escapeHtml(business.website)}</a>`
          : `<span class="missing">No website found</span>`;

        card.innerHTML = `
          <strong>${escapeHtml(business.name)}</strong><br>
          ${escapeHtml(business.address)}<br><br>

          Phone: ${escapeHtml(business.phone || "Not found")}<br>
          Website: ${websiteText}<br>
          Rating: ${escapeHtml(String(business.rating || "Not found"))}
          ${business.reviewCount ? ` (${escapeHtml(String(business.reviewCount))} reviews)` : ""}<br>
          Last Review Date: ${escapeHtml(business.latestReviewDate || "Not found")}<br>
          Status: ${escapeHtml(business.businessStatus || "Not found")}<br>
          Types: ${escapeHtml(business.types || "Not found")}<br>

          ${business.googleMapsUrl ? `<br><a href="${escapeHtml(business.googleMapsUrl)}" target="_blank">Open in Google Maps</a>` : ""}
        `;

        card.addEventListener("mouseenter", function() {
          showBusinessMarker(business);
        });

        card.addEventListener("click", function() {
          showBusinessMarker(business);
          map.panTo({ lat: Number(business.latitude), lng: Number(business.longitude) });
          map.setZoom(Math.max(map.getZoom(), 17));
        });

        resultsDiv.appendChild(card);
      }
    }

    function createMarker(business) {
      if (!business.latitude || !business.longitude) {
        return;
      }

      const marker = new google.maps.Marker({
        map: null,
        position: {
          lat: Number(business.latitude),
          lng: Number(business.longitude)
        },
        title: business.name
      });

      business.marker = marker;
      markers.push(marker);
    }

    function showBusinessMarker(business) {
      if (!business.marker) {
        return;
      }

      business.marker.setMap(map);

      if (activeInfoWindow) {
        activeInfoWindow.close();
      }

      activeInfoWindow = new google.maps.InfoWindow({
        content: `
          <strong>${escapeHtml(business.name)}</strong><br>
          ${escapeHtml(business.address)}<br>
          Rating: ${escapeHtml(String(business.rating || "Not found"))}<br>
          Last Review: ${escapeHtml(business.latestReviewDate || "Not found")}
        `
      });

      activeInfoWindow.open(map, business.marker);
    }

    function clearMarkers() {
      for (const marker of markers) {
        marker.setMap(null);
      }

      markers = [];

      if (activeInfoWindow) {
        activeInfoWindow.close();
        activeInfoWindow = null;
      }
    }

    function exportCSV() {
      if (allBusinesses.length === 0) {
        alert("No results to export.");
        return;
      }

      const headers = [
        "Business Name",
        "Address",
        "Phone",
        "Website",
        "Google Maps URL",
        "Rating",
        "Review Count",
        "Last Review Date",
        "Business Status",
        "Types",
        "Latitude",
        "Longitude"
      ];

      const rows = allBusinesses.map(business => [
        business.name,
        business.address,
        business.phone,
        business.website,
        business.googleMapsUrl,
        business.rating,
        business.reviewCount,
        business.latestReviewDate,
        business.businessStatus,
        business.types,
        business.latitude,
        business.longitude
      ]);

      let csvContent = "";
      csvContent += headers.map(csvEscape).join(",") + "\n";

      for (const row of rows) {
        csvContent += row.map(csvEscape).join(",") + "\n";
      }

      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);

      const link = document.createElement("a");
      link.href = url;
      link.download = "business_scan_results.csv";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    function clearResults() {
      allBusinesses = [];
      seenPlaceIds = new Set();
      clearMarkers();

      document.getElementById("results").innerHTML = "";
      document.getElementById("resultCount").textContent = "0";
      updateStatus("Results cleared.");
    }

    function csvEscape(value) {
      const text = String(value || "");
      const escaped = text.replace(/"/g, '""');
      return `"${escaped}"`;
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function wait(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
  </script>

  <script
    async
    defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDUx6QIBzCxqNr3_2G1L2iSmn0dT9dRLro&libraries=places&callback=initMap">
  </script>
</body>
</html>
