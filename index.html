<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Business Area Scanner</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #222;
    }

    header {
      background: #111827;
      color: white;
      padding: 16px 20px;
    }

    header h1 {
      margin: 0;
      font-size: 22px;
    }

    header p {
      margin: 6px 0 0;
      font-size: 14px;
      color: #d1d5db;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 430px;
      height: calc(100vh - 76px);
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .panel {
      background: white;
      border-left: 1px solid #ddd;
      overflow-y: auto;
      padding: 16px;
    }

    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }

    label {
      font-size: 13px;
      font-weight: bold;
    }

    input,
    select,
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    button.secondary {
      background: #374151;
    }

    button.secondary:hover {
      background: #1f2937;
    }

    button.danger {
      background: #dc2626;
    }

    button.danger:hover {
      background: #b91c1c;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .status {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px;
      font-size: 14px;
      margin-bottom: 12px;
      white-space: pre-line;
    }

    .result-count {
      font-weight: bold;
      margin-bottom: 10px;
    }

    .business-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
      background: #fff;
    }

    .business-card h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .business-card p {
      margin: 4px 0;
      font-size: 13px;
      line-height: 1.4;
    }

    .business-card a {
      color: #2563eb;
      word-break: break-word;
    }

    .small {
      font-size: 12px;
      color: #6b7280;
    }

    .warning {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-rows: 55vh auto;
        height: auto;
      }

      .panel {
        border-left: none;
        border-top: 1px solid #ddd;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Business Area Scanner</h1>
    <p>Click two corners on the map, then scan for businesses inside that area.</p>
  </header>

  <main class="layout">
    <div id="map"></div>

    <aside class="panel">
      <div class="warning">
        Your API key is inside this website code. Make sure the key is restricted to your website domain.
      </div>

      <div class="controls">
        <div>
          <label for="searchText">Business keyword</label>
          <input
            id="searchText"
            type="text"
            value="business"
            placeholder="Example: restaurant, store, dentist, business"
          />
        </div>

        <div>
          <label for="gridSpacing">Scan density</label>
          <select id="gridSpacing">
            <option value="1200">Fast / wider scan</option>
            <option value="800" selected>Normal</option>
            <option value="500">Deep / slower scan</option>
          </select>
        </div>

        <button id="scanBtn" disabled>Scan Selected Area</button>
        <button id="exportBtn" class="secondary" disabled>Export CSV</button>
        <button id="clearBtn" class="danger">Clear Area & Results</button>
      </div>

      <div id="status" class="status">
        Click the map once for corner 1, then click again for corner 2.
      </div>

      <div class="result-count" id="resultCount">Results: 0</div>

      <div id="results"></div>
    </aside>
  </main>

  <script>
    let map;
    let placesService;
    let selectedRectangle = null;
    let cornerOne = null;
    let cornerTwo = null;
    let markers = [];
    let businesses = [];
    let isScanning = false;

    const DEFAULT_CENTER = {
      lat: 40.6782,
      lng: -73.9442
    };

    function getStatusBox() {
      return document.getElementById("status");
    }

    function getResultsBox() {
      return document.getElementById("results");
    }

    function getResultCount() {
      return document.getElementById("resultCount");
    }

    function getScanButton() {
      return document.getElementById("scanBtn");
    }

    function getExportButton() {
      return document.getElementById("exportBtn");
    }

    function initMap() {
      map = new google.maps.Map(document.getElementById("map"), {
        center: DEFAULT_CENTER,
        zoom: 13,
        mapTypeControl: true,
        streetViewControl: false,
        fullscreenControl: true
      });

      placesService = new google.maps.places.PlacesService(map);

      map.addListener("click", function(event) {
        handleMapClick(event.latLng);
      });

      document.getElementById("scanBtn").addEventListener("click", scanSelectedArea);
      document.getElementById("clearBtn").addEventListener("click", clearAll);
      document.getElementById("exportBtn").addEventListener("click", exportCSV);

      getStatusBox().textContent =
        "Click the map once for corner 1, then click again for corner 2.";
    }

    function handleMapClick(latLng) {
      if (isScanning) {
        return;
      }

      if (!cornerOne) {
        clearSelectionOnly();
        cornerOne = latLng;
        addCornerMarker(latLng, "1");
        getStatusBox().textContent =
          "Corner 1 selected. Now click the opposite corner.";
        return;
      }

      if (!cornerTwo) {
        cornerTwo = latLng;
        addCornerMarker(latLng, "2");
        drawRectangle();
        getScanButton().disabled = false;
        getStatusBox().textContent =
          "Area selected. Click “Scan Selected Area”.";
        return;
      }

      clearAll();
      cornerOne = latLng;
      addCornerMarker(latLng, "1");
      getStatusBox().textContent =
        "New corner 1 selected. Now click the opposite corner.";
    }

    function addCornerMarker(latLng, label) {
      const marker = new google.maps.Marker({
        position: latLng,
        map: map,
        label: label
      });

      markers.push(marker);
    }

    function drawRectangle() {
      if (!cornerOne || !cornerTwo) {
        return;
      }

      const north = Math.max(cornerOne.lat(), cornerTwo.lat());
      const south = Math.min(cornerOne.lat(), cornerTwo.lat());
      const east = Math.max(cornerOne.lng(), cornerTwo.lng());
      const west = Math.min(cornerOne.lng(), cornerTwo.lng());

      if (selectedRectangle) {
        selectedRectangle.setMap(null);
      }

      selectedRectangle = new google.maps.Rectangle({
        bounds: {
          north: north,
          south: south,
          east: east,
          west: west
        },
        editable: false,
        draggable: false,
        map: map
      });

      map.fitBounds(selectedRectangle.getBounds());
    }

    async function scanSelectedArea() {
      if (!selectedRectangle || isScanning) {
        return;
      }

      isScanning = true;
      businesses = [];
      clearBusinessMarkers();
      renderResults();

      getScanButton().disabled = true;
      getExportButton().disabled = true;

      const keyword =
        document.getElementById("searchText").value.trim() || "business";

      const spacingMeters = Number(
        document.getElementById("gridSpacing").value
      );

      const bounds = selectedRectangle.getBounds();
      const points = createGridPoints(bounds, spacingMeters);
      const seenPlaceIds = new Set();

      getStatusBox().textContent =
        "Scanning area...\n" +
        "Grid points: " + points.length + "\n" +
        "This may take a little while if the area is large.";

      for (let i = 0; i < points.length; i++) {
        const point = points[i];

        getStatusBox().textContent =
          "Scanning area...\n" +
          "Point " + (i + 1) + " of " + points.length + "\n" +
          "Businesses found so far: " + businesses.length;

        try {
          const nearbyPlaces = await nearbySearch(point, keyword, spacingMeters);

          for (const place of nearbyPlaces) {
            if (!place.place_id) {
              continue;
            }

            if (seenPlaceIds.has(place.place_id)) {
              continue;
            }

            seenPlaceIds.add(place.place_id);

            if (!place.geometry || !place.geometry.location) {
              continue;
            }

            if (!bounds.contains(place.geometry.location)) {
              continue;
            }

            const details = await getPlaceDetails(place.place_id);

            const business = {
              placeId: place.place_id,
              name: details.name || place.name || "",
              address: details.formatted_address || place.vicinity || "",
              phone: details.formatted_phone_number || "",
              website: details.website || "",
              rating: details.rating || "",
              userRatingsTotal: details.user_ratings_total || "",
              googleMapsUrl: details.url || "",
              latitude: place.geometry.location.lat(),
              longitude: place.geometry.location.lng()
            };

            businesses.push(business);
            addBusinessMarker(business);
            renderResults();

            await sleep(120);
          }
        } catch (error) {
          console.error(error);
        }

        await sleep(250);
      }

      isScanning = false;
      getScanButton().disabled = false;
      getExportButton().disabled = businesses.length === 0;

      getStatusBox().textContent =
        "Scan complete.\n" +
        "Businesses found: " + businesses.length;
    }

    function createGridPoints(bounds, spacingMeters) {
      const northEast = bounds.getNorthEast();
      const southWest = bounds.getSouthWest();

      const north = northEast.lat();
      const east = northEast.lng();
      const south = southWest.lat();
      const west = southWest.lng();

      const centerLat = (north + south) / 2;

      const metersPerDegreeLat = 111320;
      const metersPerDegreeLng =
        111320 * Math.cos(centerLat * Math.PI / 180);

      const latStep = spacingMeters / metersPerDegreeLat;
      const lngStep = spacingMeters / metersPerDegreeLng;

      const points = [];

      for (let lat = south; lat <= north; lat += latStep) {
        for (let lng = west; lng <= east; lng += lngStep) {
          points.push(new google.maps.LatLng(lat, lng));
        }
      }

      points.push(bounds.getCenter());

      return points;
    }

    function nearbySearch(location, keyword, spacingMeters) {
      return new Promise(function(resolve, reject) {
        const request = {
          location: location,
          radius: Math.min(Math.max(spacingMeters, 300), 50000),
          keyword: keyword
        };

        placesService.nearbySearch(request, function(results, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            resolve(results || []);
            return;
          }

          if (status === google.maps.places.PlacesServiceStatus.ZERO_RESULTS) {
            resolve([]);
            return;
          }

          if (status === google.maps.places.PlacesServiceStatus.OVER_QUERY_LIMIT) {
            setTimeout(function() {
              nearbySearch(location, keyword, spacingMeters)
                .then(resolve)
                .catch(reject);
            }, 1000);
            return;
          }

          reject(new Error("Nearby Search failed: " + status));
        });
      });
    }

    function getPlaceDetails(placeId) {
      return new Promise(function(resolve) {
        const request = {
          placeId: placeId,
          fields: [
            "name",
            "formatted_address",
            "formatted_phone_number",
            "website",
            "rating",
            "user_ratings_total",
            "url"
          ]
        };

        placesService.getDetails(request, function(place, status) {
          if (status === google.maps.places.PlacesServiceStatus.OK) {
            resolve(place || {});
            return;
          }

          if (status === google.maps.places.PlacesServiceStatus.OVER_QUERY_LIMIT) {
            setTimeout(function() {
              getPlaceDetails(placeId).then(resolve);
            }, 1000);
            return;
          }

          resolve({});
        });
      });
    }

    function addBusinessMarker(business) {
      const marker = new google.maps.Marker({
        position: {
          lat: business.latitude,
          lng: business.longitude
        },
        map: map,
        title: business.name
      });

      const infoWindow = new google.maps.InfoWindow({
        content:
          "<strong>" + escapeHTML(business.name) + "</strong><br>" +
          escapeHTML(business.address) + "<br>" +
          escapeHTML(business.phone)
      });

      marker.addListener("click", function() {
        infoWindow.open(map, marker);
      });

      markers.push(marker);
    }

    function clearBusinessMarkers() {
      for (const marker of markers) {
        if (marker.getLabel && marker.getLabel()) {
          continue;
        }

        marker.setMap(null);
      }

      markers = markers.filter(function(marker) {
        return marker.getLabel && marker.getLabel();
      });
    }

    function renderResults() {
      getResultCount().textContent = "Results: " + businesses.length;

      if (businesses.length === 0) {
        getResultsBox().innerHTML = "";
        return;
      }

      getResultsBox().innerHTML = businesses.map(function(business, index) {
        const websiteHTML = business.website
          ? '<p><strong>Website:</strong> <a href="' +
            escapeAttribute(business.website) +
            '" target="_blank" rel="noopener noreferrer">' +
            escapeHTML(business.website) +
            "</a></p>"
          : "<p><strong>Website:</strong> Not found</p>";

        const mapsHTML = business.googleMapsUrl
          ? '<p><a href="' +
            escapeAttribute(business.googleMapsUrl) +
            '" target="_blank" rel="noopener noreferrer">Open in Google Maps</a></p>'
          : "";

        return (
          '<div class="business-card">' +
            "<h3>" +
              (index + 1) +
              ". " +
              escapeHTML(business.name) +
            "</h3>" +
            "<p><strong>Address:</strong> " +
              escapeHTML(business.address || "Not found") +
            "</p>" +
            "<p><strong>Phone:</strong> " +
              escapeHTML(business.phone || "Not found") +
            "</p>" +
            websiteHTML +
            "<p><strong>Rating:</strong> " +
              escapeHTML(String(business.rating || "Not found")) +
            "</p>" +
            "<p><strong>Reviews:</strong> " +
              escapeHTML(String(business.userRatingsTotal || "Not found")) +
            "</p>" +
            '<p class="small"><strong>Lat/Lng:</strong> ' +
              business.latitude +
              ", " +
              business.longitude +
            "</p>" +
            mapsHTML +
          "</div>"
        );
      }).join("");
    }

    function exportCSV() {
      if (businesses.length === 0) {
        return;
      }

      const headers = [
        "Name",
        "Address",
        "Phone",
        "Website",
        "Rating",
        "Reviews",
        "Google Maps URL",
        "Latitude",
        "Longitude",
        "Place ID"
      ];

      const rows = businesses.map(function(business) {
        return [
          business.name,
          business.address,
          business.phone,
          business.website,
          business.rating,
          business.userRatingsTotal,
          business.googleMapsUrl,
          business.latitude,
          business.longitude,
          business.placeId
        ];
      });

      const csvContent = [headers].concat(rows).map(function(row) {
        return row.map(function(value) {
          const safeValue = String(value ?? "").replace(/"/g, '""');
          return '"' + safeValue + '"';
        }).join(",");
      }).join("\n");

      const blob = new Blob([csvContent], {
        type: "text/csv;charset=utf-8;"
      });

      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");

      link.href = url;
      link.download = "business-results.csv";

      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);

      URL.revokeObjectURL(url);
    }

    function clearAll() {
      clearSelectionOnly();
      businesses = [];
      renderResults();

      getResultCount().textContent = "Results: 0";
      getScanButton().disabled = true;
      getExportButton().disabled = true;

      getStatusBox().textContent =
        "Click the map once for corner 1, then click again for corner 2.";
    }

    function clearSelectionOnly() {
      cornerOne = null;
      cornerTwo = null;

      if (selectedRectangle) {
        selectedRectangle.setMap(null);
        selectedRectangle = null;
      }

      for (const marker of markers) {
        marker.setMap(null);
      }

      markers = [];
    }

    function sleep(ms) {
      return new Promise(function(resolve) {
        setTimeout(resolve, ms);
      });
    }

    function escapeHTML(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHTML(value);
    }

    window.initMap = initMap;
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDUx6QIBzCxqNr3_2G1L2iSmn0dT9dRLro&libraries=places&callback=initMap"
    async
    defer>
  </script>
</body>
</html>
